<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The People's Board</title>
    <meta name="description" content="Structural critique, historical analysis, and community-centered perspectives. A weekly publication and podcast.">
    <meta property="og:title" content="The People's Board">
    <meta property="og:description" content="Structural critique, historical analysis, and community-centered perspectives.">
    <meta property="og:image" content="/logo.png">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            color: #f5f0e8;
            font-family: Georgia, 'Times New Roman', serif;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            width: 280px;
            height: 280px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
            color: #f5f0e8;
        }

        .tagline {
            font-size: 1.1rem;
            color: #a89f91;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-style: italic;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .links a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border: 1px solid #4a4540;
            border-radius: 8px;
            color: #f5f0e8;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .links a:hover {
            border-color: #c4503a;
            background: rgba(196, 80, 58, 0.1);
        }

        .coming-soon {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #6b6560;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/logo.png" alt="The People's Board" class="logo">
        <h1>The People's Board</h1>
        <p class="tagline">Structural critique, historical analysis, and community-centered perspectives.</p>
        <div class="links">
            <a href="https://thepeoplesboard.substack.com">Substack</a>
            <a href="https://podcast.paulrbrown.org/daily-digest.xml">Podcast RSS</a>
        </div>
        <p class="coming-soon">Full site coming soon</p>
    </div>
</body>
</html>
